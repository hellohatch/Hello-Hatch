name: Deploy production stack

on:
  push:
    branches:
      - "cursor/project-next-steps-ed26"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          set -euo pipefail
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEPLOY_ENV_FILE; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required repository secret: $var"
              exit 1
            fi
          done

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add known_hosts entry
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          if [ -n "${DEPLOY_KNOWN_HOSTS}" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi

      - name: Deploy to remote server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"
          PORT="${DEPLOY_PORT:-22}"

          printf '%s' "$DEPLOY_ENV_FILE" | ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$REMOTE" "cat > '${DEPLOY_PATH}/.env.production'"

          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$REMOTE" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            test -d .git
            chmod 600 .env.production
            git fetch --all --prune
            git checkout '${DEPLOY_BRANCH}'
            git pull --ff-only origin '${DEPLOY_BRANCH}'
            make deploy-prod
          "
